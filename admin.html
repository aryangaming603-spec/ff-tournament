<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — EXIST GAMER</title>

<style>
body{
  font-family:Inter;
  background:#000;
  color:#fff;
  padding:15px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
  border:1px solid rgba(255,255,255,0.1);
}

.btn{
  padding:10px;
  border:none;
  border-radius:50px;
  cursor:pointer;
  font-weight:bold;
}

.btn-primary{
  background:linear-gradient(135deg,#ffd700,#ffb300);
  color:#111;
}

.btn-danger{
  background:#ff3b30;
  color:#fff;
}

input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:#fff;
}

.small{color:#aaa;font-size:13px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="lockBox" class="card">
  <h3>🔐 Admin Login</h3>
  <input id="pin" placeholder="Enter PIN">
  <button onclick="unlock()" class="btn btn-primary">Unlock</button>
  <p id="msg" class="small"></p>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none">

<!-- STATS -->
<div class="card">
  <h3>📊 Stats</h3>
  <p id="stats"></p>
</div>

<!-- PLAYERS -->
<div class="card">
  <h3>👥 Players</h3>
  <input id="search" placeholder="Search player...">

  <table id="table"></table>

  <button onclick="clearAll()" class="btn btn-danger">Clear All</button>
</div>

<!-- ADD MATCH -->
<div class="card">
  <h3>🎮 Add Match</h3>

  <input id="roomId" placeholder="Room ID">
  <input id="roomPass" placeholder="Room Password">

  <div id="matchPlayers"></div>

  <button onclick="saveMatch()" class="btn btn-primary">Save Match</button>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBh3Bu4R28g93x32DXW_-OIrscbqjIrT4k",
  authDomain: "exist-gamer.firebaseapp.com",
  databaseURL: "https://exist-gamer-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "exist-gamer"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let players = {};

/* LOGIN */
async function unlock(){
  const pin = document.getElementById('pin').value;
  const snap = await db.ref('settings/adminPin').once('value');
  const real = snap.val() || "786786";

  if(pin == real){
    document.getElementById('lockBox').style.display="none";
    document.getElementById('admin').style.display="block";
  } else {
    document.getElementById('msg').innerText="Wrong PIN";
  }
}

/* LOAD PLAYERS */
db.ref('players').on('value', snap=>{
  players = snap.val() || {};
  render();
  loadMatchPlayers();
});

/* RENDER */
function render(){
  const table = document.getElementById('table');
  table.innerHTML="";
  let i=1, paid=0;

  Object.entries(players).forEach(([id,p])=>{
    if(p.paid) paid++;

    table.innerHTML += `
    <tr>
      <td>${i++}</td>
      <td>${p.name}</td>
      <td>${p.paid ? "Paid" : "Pending"}</td>
      <td>
        <button onclick="markPaid('${id}')" class="btn btn-primary">Paid</button>
        <button onclick="del('${id}')" class="btn btn-danger">X</button>
      </td>
    </tr>`;
  });

  document.getElementById('stats').innerText =
    "Total: "+(i-1)+" | Paid: "+paid;
}

/* ACTIONS */
function markPaid(id){
  db.ref('players/'+id).update({paid:1});
}

function del(id){
  db.ref('players/'+id).remove();
}

function clearAll(){
  if(confirm("Delete all?")){
    db.ref('players').set(null);
  }
}

/* SEARCH */
document.getElementById('search').addEventListener('input', e=>{
  const val = e.target.value.toLowerCase();
  document.querySelectorAll('#table tr').forEach(row=>{
    row.style.display =
      row.innerText.toLowerCase().includes(val) ? '' : 'none';
  });
});

/* LOAD MATCH PLAYERS */
function loadMatchPlayers(){
  const div = document.getElementById('matchPlayers');
  div.innerHTML="";

  Object.entries(players).forEach(([id,p])=>{
    if(p.paid){
      div.innerHTML += `
        <div style="margin-top:8px">
          <b>${p.name}</b>
          <input id="kill_${id}" placeholder="Kills" type="number">
        </div>`;
    }
  });
}

/* SAVE MATCH */
function saveMatch(){
  const roomId = document.getElementById('roomId').value;
  const roomPass = document.getElementById('roomPass').value;

  let matchPlayers = [];

  Object.entries(players).forEach(([id,p])=>{
    if(p.paid){
      const kills = document.getElementById('kill_'+id).value || 0;

      matchPlayers.push({
        name:p.name,
        kills:Number(kills)
      });
    }
  });

  db.ref('matches').push({
    roomId,
    roomPass,
    players:matchPlayers,
    createdAt:Date.now()
  });

  alert("✅ Match Saved!");
}
</script>

</body>
</html>
