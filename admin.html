<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Admin — EXIST GAMER</title>

<style>
body{
  font-family:Inter,system-ui;
  background:#000;
  color:#fff;
  margin:0;
  padding:15px;
}

/* GLASS CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 8px 30px rgba(0,0,0,0.6);
}

/* BUTTON */
.btn{
  padding:10px;
  border:none;
  border-radius:50px;
  cursor:pointer;
  font-weight:bold;
}

.btn-primary{
  background:linear-gradient(135deg,#ffd700,#ffb300);
  color:#111;
}

.btn-danger{
  background:#ff3b30;
  color:#fff;
}

input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:#fff;
}

table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.small{
  color:#aaa;
  font-size:13px;
}
</style>
</head>

<body>

<div class="card">
<h2>🔥 EXIST GAMER ADMIN</h2>
</div>

<!-- LOCK -->
<div id="lockBox" class="card">
  <input id="pin" placeholder="Enter PIN">
  <button class="btn btn-primary" onclick="unlock()">Unlock</button>
  <p id="msg" class="small"></p>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none">

<div class="card">
<h3>📊 Stats</h3>
<p id="stats" class="small"></p>
</div>

<div class="card">
<input id="search" placeholder="Search player...">
</div>

<div class="card">
<h3>👥 Players</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>UID</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<button class="btn btn-danger" onclick="clearAll()">Clear All</button>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBh3Bu4R28g93x32DXW_-OIrscbqjIrT4k",
  authDomain: "exist-gamer.firebaseapp.com",
  databaseURL: "https://exist-gamer-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "exist-gamer"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let players = {};

/* UNLOCK */
async function unlock(){
  const pin = document.getElementById('pin').value;
  const snap = await db.ref('settings/adminPin').once('value');
  const real = snap.val() || "786786";

  if(pin == real){
    document.getElementById('lockBox').style.display="none";
    document.getElementById('admin').style.display="block";
  } else {
    document.getElementById('msg').innerText="Wrong PIN";
  }
}

/* LOAD PLAYERS */
db.ref('players').on('value', snap=>{
  players = snap.val() || {};
  render();
});

/* RENDER */
function render(){
  const table = document.getElementById('table');
  table.innerHTML="";

  let i=1;
  let paid=0;

  Object.entries(players).forEach(([key,p])=>{
    if(p.paid) paid++;

    table.innerHTML += `
    <tr>
      <td>${i++}</td>
      <td>${p.name}</td>
      <td>${p.uid}</td>
      <td>${p.paid ? 'Paid' : 'Pending'}</td>
      <td>
        <button onclick="markPaid('${key}')" class="btn btn-primary">Paid</button>
        <button onclick="del('${key}')" class="btn btn-danger">X</button>
      </td>
    </tr>
    `;
  });

  document.getElementById('stats').innerText =
    "Total: "+(i-1)+" | Paid: "+paid;
}

/* ACTIONS */
function markPaid(id){
  db.ref('players/'+id).update({paid:1});
}

function del(id){
  db.ref('players/'+id).remove();
}

function clearAll(){
  if(confirm("Delete all?")){
    db.ref('players').set(null);
  }
}

/* SEARCH */
document.getElementById('search').addEventListener('input', e=>{
  const val = e.target.value.toLowerCase();

  document.querySelectorAll('#table tr').forEach(row=>{
    row.style.display =
      row.innerText.toLowerCase().includes(val) ? '' : 'none';
  });
});
</script>

</body>
</html>
