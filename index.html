<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EXIST GAMER</title>

<style>
:root{
  --glass: rgba(255,255,255,0.15);
  --border: rgba(255,255,255,0.25);
}

/* 🌌 BACKGROUND (iPhone + gaming) */
body{
  margin:0;
  font-family: Inter;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  min-height:100vh;
}

/* CONTAINER */
.container{
  max-width:1000px;
  margin:auto;
  padding:15px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
}

/* 💎 CARD */
.card{
  width:100%;
  max-width:100%;
  overflow:hidden;

  background:var(--glass);
  backdrop-filter:blur(25px);

  border-radius:25px;
  padding:15px;
  margin-top:15px;

  border:1px solid var(--border);

  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

/* BUTTON */
.btn{
  padding:12px;
  border:none;
  border-radius:50px;
  width:100%;
  font-weight:bold;
  cursor:pointer;
}

.btn-primary{
  background:linear-gradient(135deg,#ffd700,#ffb300);
  color:black;
}

.btn-ghost{
  background:rgba(255,255,255,0.2);
  color:white;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:20px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.1);
  color:white;
}

/* TABLE */
table{
  width:100%;
}

td{
  padding:8px;
}

/* SLOT BAR */
.bar{
  height:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.2);
  overflow:hidden;
}

.bar-inner{
  height:100%;
  width:0%;
  background:lime;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <h2>🔥 EXIST GAMER</h2>

  <div style="display:flex;gap:8px">
    <button onclick="go('leaderboard.html')" class="btn btn-ghost">🏆</button>
    <button onclick="go('verify.html')" class="btn btn-ghost">🔍</button>
    <button onclick="admin()" class="btn btn-ghost">⚙️</button>
  </div>
</div>

<!-- TOURNAMENT -->
<div class="card">
  <h3 id="title">Loading...</h3>
  <p id="info"></p>

  <button onclick="startPayment()" class="btn btn-primary">
    💰 Pay & Register
  </button>

  <!-- SLOT -->
  <div style="margin-top:10px">
    <div style="display:flex;justify-content:space-between">
      <span>Slots</span>
      <span id="slotText">0/48</span>
    </div>

    <div class="bar">
      <div id="bar" class="bar-inner"></div>
    </div>
  </div>
</div>

<!-- REGISTER -->
<div class="card">
  <input id="name" placeholder="Name">
  <input id="uid" placeholder="UID">
  <input id="wp" placeholder="WhatsApp">
</div>

<!-- PAYMENT -->
<div id="paymentBox" class="card" style="display:none;text-align:center">
  <h3>💰 Payment</h3>

  <img src="qr.png" style="width:180px;border-radius:15px">

  <p>UPI: <b id="upi"></b></p>

  <button onclick="openUPI()" class="btn btn-primary">Open UPI</button>
  <button onclick="sendProof()" class="btn btn-ghost" style="margin-top:8px">
    Send Proof
  </button>

  <p id="codeBox"></p>
</div>

<!-- PLAYERS -->
<div class="card">
  <h3>Players</h3>
  <table id="table"></table>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBh3Bu4R28g93x32DXW_-OIrscbqjIrT4k",
  databaseURL: "https://exist-gamer-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let settings = {};
let lastCode = "";

/* SETTINGS */
db.ref('settings').on('value', snap=>{
  settings = snap.val()||{};
  document.getElementById('title').innerText = settings.name;
  document.getElementById('info').innerText =
    "Entry ₹"+settings.fee+" | "+settings.map;
  document.getElementById('upi').innerText = settings.upi;
});

/* PLAYERS */
db.ref('players').on('value', snap=>{
  const p = snap.val()||{};
  let html="", i=1;

  const filled = Object.keys(p).length;
  const total = settings.slots || 48;

  const percent = (filled/total)*100;

  document.getElementById('slotText').innerText = filled+"/"+total;
  document.getElementById('bar').style.width = percent+"%";

  Object.values(p).forEach(x=>{
    html+=`<tr>
      <td>${i++}</td>
      <td>${x.name}</td>
      <td>${x.paid?"✅":"⏳"}</td>
    </tr>`;
  });

  document.getElementById('table').innerHTML = html;
});

/* CODE */
function code(){
  return Math.random().toString(36).substr(2,6).toUpperCase();
}

/* REGISTER + PAYMENT */
function startPayment(){
  const name = document.getElementById('name').value;
  const uid = document.getElementById('uid').value;
  const wp = document.getElementById('wp').value;

  if(!name||!uid||!wp){
    alert("Fill details");
    return;
  }

  lastCode = code();

  db.ref('players').push({
    name, uid, wp,
    code:lastCode,
    paid:0
  });

  document.getElementById('paymentBox').style.display="block";

  document.getElementById('codeBox').innerHTML =
    "Your Code: <b>"+lastCode+"</b>";
}

/* PAYMENT */
function openUPI(){
  const link=`upi://pay?pa=${settings.upi}&pn=EXIST GAMER&am=${settings.fee}&cu=INR`;
  window.location.href=link;
}

function sendProof(){
  const msg=`Paid\nCode: ${lastCode}`;
  window.open("https://wa.me/9170856377?text="+encodeURIComponent(msg));
}

/* NAV */
function go(p){ window.location.href=p; }

async function admin(){
  const pin=prompt("Enter PIN");
  const snap=await db.ref('settings/adminPin').once('value');
  if(pin==snap.val()) window.open("admin.html");
  else alert("Wrong");
}
</script>

</body>
</html>
