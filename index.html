<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EXIST GAMER</title>

<style>
:root{
  --glass: rgba(255,255,255,0.12);
  --border: rgba(255,255,255,0.2);
  --gold:#ffd700;
}

/* 🌌 BACKGROUND (iPhone sky feel) */
body{
  margin:0;
  font-family: Inter;
  background: linear-gradient(135deg,#87ceeb,#5aa9ff,#1e3c72);
  min-height:100vh;
  color:white;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:15px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

h1{
  margin:0;
  color:white;
}

/* 💎 GLASS CARD */
.card{
  background:var(--glass);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);

  border-radius:25px;
  padding:15px;
  margin-top:15px;

  border:1px solid var(--border);

  box-shadow:
    0 10px 40px rgba(0,0,0,0.3),
    inset 0 1px 1px rgba(255,255,255,0.2);

  width:100%;
  overflow:hidden; /* FIX overflow */
}

/* BUTTON */
.btn{
  padding:12px;
  border:none;
  border-radius:50px;
  cursor:pointer;
  font-weight:bold;
  width:100%;
}

.btn-primary{
  background:linear-gradient(135deg,#ffd700,#ffb300);
  color:#111;
}

.btn-ghost{
  background:rgba(255,255,255,0.2);
  color:white;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:20px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.1);
  color:white;
  margin-top:8px;
}

/* GRID */
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

@media(max-width:800px){
  .row{
    grid-template-columns:1fr;
  }
}

/* TABLE */
table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}

td{
  padding:10px;
}

/* SMALL */
.small{
  font-size:13px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div>
    <h1>🔥 EXIST GAMER</h1>
    <div class="small">Pro Tournament System</div>
  </div>

  <div style="display:flex;gap:10px;margin-top:10px">
    <button onclick="go('leaderboard.html')" class="btn btn-ghost">🏆</button>
    <button onclick="go('verify.html')" class="btn btn-ghost">🔍</button>
    <button onclick="goAdmin()" class="btn btn-ghost">⚙️</button>
  </div>
</div>

<!-- TOURNAMENT -->
<div class="card">
  <h2 id="title">Loading...</h2>
  <p id="info" class="small"></p>

  <button onclick="toggleQR()" class="btn btn-primary">
    💰 Pay & Register
  </button>
</div>

<!-- REGISTER -->
<div class="card">
  <h3>Register</h3>

  <input id="name" placeholder="Name">
  <input id="uid" placeholder="UID">
  <input id="wp" placeholder="WhatsApp">

</div>

<!-- PAYMENT -->
<div id="paymentBox" class="card" style="display:none;text-align:center">

  <h3>💰 Complete Payment</h3>

  <img src="qr.png" style="width:200px;border-radius:15px">

  <p>UPI: <b id="upiText">loading...</b></p>

  <button onclick="openUPI()" class="btn btn-primary">
    Open UPI
  </button>

  <button onclick="sendProof()" class="btn btn-ghost" style="margin-top:8px">
    Send Proof
  </button>

</div>

<!-- PLAYERS -->
<div class="card">
  <h3>Players</h3>
  <table id="table"></table>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBh3Bu4R28g93x32DXW_-OIrscbqjIrT4k",
  databaseURL: "https://exist-gamer-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let settings={};

/* LOAD SETTINGS */
db.ref('settings').on('value', snap=>{
  settings = snap.val()||{};
  document.getElementById('title').innerText = settings.name || "Tournament";
  document.getElementById('info').innerText =
    "Entry ₹"+(settings.fee||25)+" | Map "+(settings.map||"Bermuda");

  document.getElementById('upiText').innerText = settings.upi;
});

/* LOAD PLAYERS */
db.ref('players').on('value', snap=>{
  const players = snap.val()||{};
  let html="";
  let i=1;

  Object.values(players).forEach(p=>{
    html += `<tr>
      <td>${i++}</td>
      <td>${p.name}</td>
      <td>${p.paid ? "✅" : "⏳"}</td>
    </tr>`;
  });

  document.getElementById('table').innerHTML = html;
});

/* NAV */
function go(page){
  window.location.href = page;
}

async function goAdmin(){
  const pin = prompt("Enter PIN");
  const snap = await db.ref('settings/adminPin').once('value');
  if(pin == snap.val()){
    window.open("admin.html","_blank");
  } else {
    alert("Wrong PIN");
  }
}

/* PAYMENT */
function toggleQR(){
  const n=document.getElementById('name').value;
  const u=document.getElementById('uid').value;
  const w=document.getElementById('wp').value;

  if(!n||!u||!w){
    alert("Fill details first");
    return;
  }

  document.getElementById('paymentBox').style.display="block";
}

function openUPI(){
  const link = `upi://pay?pa=${settings.upi}&pn=EXIST GAMER&am=${settings.fee}&cu=INR`;
  window.location.href = link;
}

function sendProof(){
  const msg="I have paid, please verify.";
  window.open("https://wa.me/9170856377?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
