<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EXIST GAMER — Tournament</title>

<style>
:root{
  --gold:#EFB810;
}

/* BODY */
body{
  margin:0;
  font-family:Inter;
  background: radial-gradient(circle at top,#111,#000);
  color:#fff;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:15px;
}

/* GLASS CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:15px;
  margin-top:15px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 8px 30px rgba(0,0,0,0.6);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
}

/* BUTTON */
.btn{
  padding:12px;
  border-radius:50px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.btn-primary{
  background:linear-gradient(135deg,#ffd700,#ffb300);
  color:#111;
}

.btn-ghost{
  background:transparent;
  border:1px solid rgba(255,255,255,0.1);
  color:gold;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:white;
  margin-top:8px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h1{
  color:gold;
}

/* TABLE */
table{
  width:100%;
}

td,th{
  padding:10px;
}

/* MOBILE */
@media(max-width:800px){
  .header{flex-direction:column;gap:10px}
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div>
    <h1>🔥 EXIST GAMER</h1>
    <p>Solo Tournament</p>
  </div>

  <div>
    <button onclick="unlockAdmin()" class="btn btn-ghost">Admin</button>
  </div>
</div>

<!-- TOURNAMENT -->
<div class="card">
  <h2 id="title">Tournament</h2>
  <p id="info">Loading...</p>

  <button onclick="toggleQR()" class="btn btn-primary">Pay & Register</button>
</div>

<!-- REGISTER -->
<div class="card">
  <h3>Register</h3>

  <input id="name" placeholder="Name">
  <input id="uid" placeholder="UID">
  <input id="wp" placeholder="WhatsApp">

  <button onclick="register()" class="btn btn-primary">Register</button>
</div>

<!-- PLAYERS -->
<div class="card">
  <h3>Players</h3>
  <table id="table"></table>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBh3Bu4R28g93x32DXW_-OIrscbqjIrT4k",
  authDomain: "exist-gamer.firebaseapp.com",
  databaseURL: "https://exist-gamer-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "exist-gamer"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let players = {};

/* LOAD SETTINGS */
db.ref('settings').on('value', snap=>{
  const s = snap.val();
  document.getElementById('title').innerText = s.name;
  document.getElementById('info').innerText =
    "Entry ₹"+s.fee+" | Map "+s.map;
});

/* LOAD PLAYERS */
db.ref('players').on('value', snap=>{
  players = snap.val()||{};
  render();
});

/* RENDER */
function render(){
  let html="";
  let i=1;

  Object.entries(players).forEach(([k,p])=>{
    html += `
    <tr>
      <td>${i++}</td>
      <td>${p.name}</td>
      <td>${p.paid ? "Paid" : "Pending"}</td>
    </tr>`;
  });

  document.getElementById('table').innerHTML = html;
}

/* REGISTER */
function register(){
  const name = document.getElementById('name').value;
  const uid = document.getElementById('uid').value;
  const wp = document.getElementById('wp').value;

  if(!name||!uid||!wp){
    alert("Fill all fields");
    return;
  }

  db.ref('players').push({
    name, uid, wp,
    paid:0
  });

  alert("Registered!");
}

/* ADMIN */
async function unlockAdmin(){
  const pin = prompt("Enter PIN");

  const snap = await db.ref('settings/adminPin').once('value');
  const real = snap.val();

  if(pin == real){
    window.open("admin.html","_blank");
  } else {
    alert("Wrong PIN");
  }
}
</script>

</body>
</html>
