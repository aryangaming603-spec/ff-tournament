<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Verify — EXIST GAMER</title>

<style>
body{
  font-family:Inter;
  background: radial-gradient(circle at top,#111,#000);
  color:#fff;
  margin:0;
  padding:15px;
}

.container{
  max-width:750px;
  margin:auto;
}

/* GLASS CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:15px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 8px 30px rgba(0,0,0,0.6);
}

/* INPUT */
.input{
  width:100%;
  padding:12px;
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:white;
  margin-top:8px;
}

/* BUTTON */
.btn{
  padding:10px 12px;
  border-radius:50px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.btn-primary{
  background:linear-gradient(135deg,#ffd700,#ffb300);
  color:#111;
}

.btn-ghost{
  background:#222;
  color:#fff;
}

/* RESULT */
.result{
  margin-top:15px;
}

.status-paid{
  background:#113c12;
  color:#d1f7d8;
  padding:10px;
  border-radius:10px;
}

.status-pend{
  background:#3f2b15;
  color:#f3e8d7;
  padding:10px;
  border-radius:10px;
}

.small{
  color:#aaa;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <h2>🔍 Verify Registration</h2>
  <p class="small">Enter UID or Code to check payment & room details.</p>

  <input id="q" class="input" placeholder="Enter UID or Code">

  <div style="display:flex;gap:8px;margin-top:10px">
    <button id="searchBtn" class="btn btn-primary">Search</button>
    <button id="showAllBtn" class="btn btn-ghost">Show Paid</button>
  </div>

  <div id="out" class="result"></div>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBh3Bu4R28g93x32DXW_-OIrscbqjIrT4k",
  authDomain: "exist-gamer.firebaseapp.com",
  databaseURL: "https://exist-gamer-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "exist-gamer"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const q = document.getElementById('q');
const out = document.getElementById('out');

/* SEARCH */
document.getElementById('searchBtn').onclick = async ()=>{
  const v = q.value.trim();
  if(!v) return alert("Enter UID or Code");

  out.innerHTML = "<div class='small'>Searching...</div>";

  const snap = await db.ref('players').once('value');
  const players = snap.val() || {};

  const found = Object.values(players).filter(p =>
    (p.uid && p.uid.includes(v)) ||
    (p.code && p.code.toUpperCase() == v.toUpperCase())
  );

  if(found.length === 0){
    out.innerHTML = "<div class='small'>No player found</div>";
    return;
  }

  const settingsSnap = await db.ref('settings').once('value');
  const settings = settingsSnap.val() || {};

  out.innerHTML = found.map(p=>{
    return `
    <div class="card" style="margin-top:10px">
      <b>${p.name}</b><br>
      <div class="small">UID: ${p.uid} | Code: ${p.code}</div>
      <div style="margin-top:8px">
      ${
        p.paid
        ? `<div class="status-paid">
            ✅ Paid<br>
            Room: ${settings.roomId || "Not set"}<br>
            Password: ${settings.roomPass || "Not set"}
          </div>`
        : `<div class="status-pend">
            ⏳ Pending — Wait for admin
          </div>`
      }
      </div>
    </div>
    `;
  }).join('');
};

/* SHOW ALL PAID */
document.getElementById('showAllBtn').onclick = async ()=>{
  out.innerHTML = "<div class='small'>Loading...</div>";

  const snap = await db.ref('players').once('value');
  const players = snap.val() || {};

  const paid = Object.values(players).filter(p=>p.paid);

  if(paid.length === 0){
    out.innerHTML = "<div class='small'>No paid players yet</div>";
    return;
  }

  out.innerHTML = paid.map((p,i)=>`
    <div class="card" style="margin-top:10px">
      <b>${i+1}. ${p.name}</b>
      <div class="small">Code: ${p.code}</div>
    </div>
  `).join('');
};
</script>

</body>
</html>
